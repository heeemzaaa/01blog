<main class="w-100 d-flex justify-content-center p-4">
    <div class="w-50 d-flex flex-column justify-content-start align-items-center gap-5">
        <section class="d-flex p-4 justify-content-between align-items-center w-100">
            <div>
                <h2 class="fw-bold p-0 m-0">Notifications</h2>
                <span class="text-secondary">
                    You have {{ getUnreadCount() }} unread notifications
                </span>
            </div>
            <div id="actions" class="d-flex gap-2">
                <button role="button" class="b_1 px-3 py-1 fw-bold d-flex gap-2" (click)="markAllAsRead()">
                    <mat-icon>done</mat-icon>
                    Mark all as read
                </button>

            </div>
        </section>

        @for(notification of notifications(); track notification.id) {
        <section class="w-100 d-flex flex-column justify-content-center align-items-center">
            <div id="card" class="w-100 d-flex flex-column c-b p-4 justify-content-start gap-4"
                [class.seen]="notification.isSeen" [class.unseen]="!notification.isSeen">

                <div class="d-flex gap-3 align-items-center">
                    <img [src]="notification.actor.profileImage
          ? 'http://localhost:8080' + notification.actor.profileImage
          : '/profile.png'" class="c_image" />

                    <p class="p-0 m-0">
                        {{ getNotificationText(notification) }}
                    </p>
                </div>

                <div class="d-flex justify-content-between">
                    <span class="text-secondary small">
                        {{ timeAgo(notification.createdAt) }}
                    </span>

                    <div class="d-flex gap-2">
                        @if(!notification.isSeen) {
                        <button class="b_1 px-3 py-1 fw-bold d-flex gap-2" (click)="markAsRead(notification.id)">
                            <mat-icon>done</mat-icon>
                            Mark as Read
                        </button>
                        }
                    </div>
                </div>

            </div>
        </section>
        }
    </div>
</main>
