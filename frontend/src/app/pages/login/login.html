<div class="login-wrapper">

    <h1 class="title">01Blog</h1>

    <div class="login-card">

        <div class="card-title">
            <h2 class="subtitle">Welcome Back</h2>
            <p class="subtitle">Sign in to continue your learning journey</p>
        </div>

        <form class="form" (ngSubmit)="onLogin()">

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" [(ngModel)]="password"
                    placeholder="Enter your password" required>
            </div>
            @if (errorMessage()) {
                <div class="error-alert">
                    {{ errorMessage() }}
                </div>  
            }

            <button type="submit" class="submit-btn">Sign In</button>

        </form>

        <div class="footer">
            <p>Don't have an account? <a routerLink="/register">Sign up</a></p>
        </div>
    </div>



</div>
