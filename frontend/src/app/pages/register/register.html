<div class="login-wrapper">
    <h1 class="title">01Blog</h1>

    <div class="login-card">
        <div class="card-title">
            <h2 class="subtitle">Join 01Blog</h2>
            @if (part == 1){
            <p class="subtitle">Step 1 of 2: Basic Information</p>
            } @else {
            <p class="subtitle">Step 2 of 2: Complete Your Profile</p>
            }
        </div>

        <div class="progress-wrapper">
            <div class="progress-bar" [class.active]="part === 1"></div>
            <div class="progress-bar" [class.active]="part !== 1"></div>
        </div>



        <form class="form" (ngSubmit)="onRegister()">

            @if (part == 1) {
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="firstName" [(ngModel)]="formData.firstName" placeholder="First Name" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="lastName" [(ngModel)]="formData.lastName" placeholder="Last Name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" [(ngModel)]="formData.email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" [(ngModel)]="formData.password" placeholder="Create a password"
                    required>
            </div>

            @if (errorMessage()) {
            <div class="error-alert">
                {{ errorMessage() }}
            </div>
            }

            <button type="button" class="next-btn" (click)="onNext()">Next</button>
            } @else {
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="userName" [(ngModel)]="formData.username" placeholder="User Name" required>
            </div>

            <div class="form-group">
                <label>Profile Image</label>
                <input type="file" accept="image/*" (change)="onFileSelected($event)" class="file_input" />

                @if (imagePreview) {
                <div class="image-preview">
                    <img [src]="imagePreview" alt="Preview">
                    <button type="button" (click)="removeImage()" class="btn-remove">
                        Remove
                    </button>
                </div>
                }

            </div>

            <div class="form-group">
                <label>Bio (Optional)</label>
                <textarea name="about" id="about_me" [(ngModel)]="formData.about"></textarea>
            </div>

            @if(errorMessage()) {
            <div class="error-alert">
                {{ errorMessage() }}
            </div>
            }

            <div class="buttons">
                <button type="button" class="back-btn" (click)="onBack()">Back</button>
                <button type="submit" class="submit-btn">Register</button>

            </div>
            }
        </form>


        <div class="footer">
            <p>Already have an account? <a routerLink="/login">Sign In</a></p>
        </div>
    </div>
</div>
